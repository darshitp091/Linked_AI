name: Scheduled Posting Cron

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Scheduled Posting API
        run: |
          curl -X GET "https://${{ secrets.SITE_URL }}/api/cron/publish-scheduled" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail \
          --retry 3 \
          --retry-delay 5
